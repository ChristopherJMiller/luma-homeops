---
name: ceph-nfs-export-operator image

# Build + push the operator image to GHCR on every main commit that
# touches its source. Tags both :sha-<short> (immutable, what we pin in
# the Deployment) and :latest (mutable, for ad-hoc kubectl edits).

on:
  push:
    branches: [main]
    paths:
      - operators/ceph-nfs-export-operator/**
      - .github/workflows/ceph-nfs-export-operator.yml
  pull_request:
    paths:
      - operators/ceph-nfs-export-operator/**
      - .github/workflows/ceph-nfs-export-operator.yml
  workflow_dispatch:

concurrency:
  group: ceph-nfs-export-operator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/ceph-nfs-export-operator

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: astral-sh/ruff-action@v3.6.1
        with:
          src: operators/ceph-nfs-export-operator/src

  build:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.1

      - uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6.19.2
        with:
          context: operators/ceph-nfs-export-operator
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
