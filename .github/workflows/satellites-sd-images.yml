---
name: satellites SD images

# Build SD bootstrap images for each satellite on native aarch64 GitHub
# runners and push every resulting store path (kernel, initrd, system
# closure) to christopherjmiller.cachix.org. Future local `nix build` of
# the same image substitutes from the cache instead of recompiling under
# qemu emulation.

on:
  push:
    branches: [main, satellites/release]
    paths:
      - satellites/**
      - .github/workflows/satellites-sd-images.yml
  workflow_dispatch:

# Newer pushes supersede in-flight builds of the same ref to avoid wasted
# 60-minute kernel compiles on every iteration.
concurrency:
  group: satellites-sd-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        host: [octoprint, printer]
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            substituters = https://cache.nixos.org https://nixos-raspberrypi.cachix.org https://christopherjmiller.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nixos-raspberrypi.cachix.org-1:4iMO9LXa8BqhU+Rpg6LQKiGa2lsNh/j2oiYLNOQ5sPI= christopherjmiller.cachix.org-1:SpwpBjcK+4KV9+rd6V5+01ivGMu4KPBytdgbst3GNnE=

      - uses: cachix/cachix-action@v15
        with:
          name: christopherjmiller
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build SD image
        working-directory: satellites
        run: |
          nix build --print-build-logs \
            'path:.#packages.aarch64-linux.sdImage-${{ matrix.host }}'

      # Also build what comin actually pulls at runtime — the full per-host
      # toplevel (`nixosConfigurations.<host>.config.system.build.toplevel`).
      # The SD image is the bootstrap; comin then switches into THIS closure.
      # Building it here means cachix-action pushes every derivation, so the
      # Pi never has to compile unit files / nginx configs / etc. on-device.
      - name: Build per-host toplevel (comin's target)
        working-directory: satellites
        run: |
          nix build --no-link --print-build-logs \
            'path:.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel'

      # Best-effort push to self-hosted attic alongside cachix. Gated on
      # `vars.ATTIC_PUSH_ENABLED == 'true'` so cold-bootstrap (no attic yet)
      # and total cluster rebuilds don't fail the workflow. `continue-on-error`
      # so even when enabled, an attic outage doesn't block builds — cachix
      # is the resilient default.
      - name: Push to attic (best-effort)
        if: vars.ATTIC_PUSH_ENABLED == 'true'
        continue-on-error: true
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          ATTIC_ENDPOINT: ${{ vars.ATTIC_ENDPOINT }}
          ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
        working-directory: satellites
        run: |
          set -eu
          if [ -z "${ATTIC_TOKEN:-}" ]; then
            echo "::warning::ATTIC_TOKEN secret missing — skipping attic push"
            exit 0
          fi
          if [ -z "${ATTIC_ENDPOINT:-}" ] || [ -z "${ATTIC_CACHE:-}" ]; then
            echo "::warning::ATTIC_ENDPOINT / ATTIC_CACHE var missing — skipping attic push"
            exit 0
          fi
          nix run --refresh github:zhaofengli/attic#attic-client -- \
            login server "$ATTIC_ENDPOINT" "$ATTIC_TOKEN"
          toplevel=$(nix path-info \
            'path:.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel')
          sdimage=$(nix path-info \
            'path:.#packages.aarch64-linux.sdImage-${{ matrix.host }}')
          nix run github:zhaofengli/attic#attic-client -- \
            push "server:$ATTIC_CACHE" "$toplevel" "$sdimage"

      - name: Locate built image
        id: image
        working-directory: satellites
        run: |
          img=$(readlink -f result | xargs -I{} find {} -maxdepth 3 -name '*.img.zst' | head -1)
          echo "path=$img" >> "$GITHUB_OUTPUT"
          ls -lh "$img"

      - name: Upload SD image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdImage-${{ matrix.host }}
          path: ${{ steps.image.outputs.path }}
          retention-days: 30
          if-no-files-found: error
