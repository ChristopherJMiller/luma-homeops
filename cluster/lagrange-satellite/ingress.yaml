---
# Public ingress for the Lagrange admin API. Auth happens in two layers:
#
#   1. Authentik SSO via nginx forward-auth — uses the existing
#      ak-outpost-media-outpost in the authentik namespace (legacy name;
#      it's actually a domain-level outpost for *.chrismiller.xyz that
#      already serves the media *arr apps). Same annotation set as
#      media/lidarr et al.
#
#   2. Lagrange-admin trusts the X-authentik-username header when the
#      source IP is the wg0 peer (10.99.0.1) — see option G in the
#      cluster-side discussion. Automation paths still use the bearer
#      token via the in-cluster Service (lagrange-admin.ops.svc:8443),
#      which bypasses SSO entirely.
#
# Note: clients hitting the PUBLIC URL with just a bearer token will get
# redirected to authentik (forward-auth runs on every request). For
# scripted/automated callers, use the in-cluster Service path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lagrange-admin
  namespace: ops
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Publish lagrange.chrismiller.xyz as a CNAME → chrismiller.xyz (the
    # apex resolves to the WAN IP; the router port-forwards 80/443 to the
    # ingress LB at 192.168.0.6). external-dns only manages CNAME+TXT
    # records, so it needs the target spelled out.
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    # lagrange-admin speaks plain HTTP on :8443 (the port number is high
    # but the protocol is not TLS). nginx terminates the public TLS; the
    # upstream hop is HTTP all the way through socat to 10.99.0.2:8443.
    # Authentik forward-auth (same pattern as media/lidarr, media/sonarr, etc.)
    nginx.ingress.kubernetes.io/auth-url: "http://ak-outpost-media-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://auth.chrismiller.xyz/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
spec:
  ingressClassName: nginx
  tls:
    - hosts: [lagrange.chrismiller.xyz]
      secretName: lagrange-admin-tls
  rules:
    - host: lagrange.chrismiller.xyz
      http:
        paths:
          # /orbit/* — Vite SPA, served by the orbit pod's own nginx.
          # Listed first as a doc-order hint but ingress-nginx matches by
          # longest prefix regardless of ordering.
          - path: /orbit
            pathType: Prefix
            backend:
              service:
                name: orbit
                port:
                  number: 8080
          # Everything else — including /v1/* (the admin API) and the
          # bare host — falls through to lagrange-admin. The orbit SPA
          # itself redirects / → /orbit/ for browser users; automation
          # hitting /v1/health directly still lands on the admin service.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lagrange-admin
                port:
                  number: 8443
