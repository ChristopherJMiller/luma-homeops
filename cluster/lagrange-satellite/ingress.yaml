---
# Public ingress for the Lagrange admin API. Auth is bearer-token only
# for now — the client sends Authorization: Bearer <token> directly; the
# token lives in the lagrange-admin-token Secret (SealedSecret-backed) and
# matches what's in the Lagrange host's sops-encrypted satellite.yaml.
#
# external-dns will provision lagrange.chrismiller.xyz pointing at the
# ingress LB (192.168.0.6 / Cloudflare). Authentik SSO is intentionally
# deferred — re-add an auth-url annotation here once an nginx-mode outpost
# is set up in the authentik namespace.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lagrange-admin
  namespace: ops
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Publish lagrange.chrismiller.xyz as a CNAME → chrismiller.xyz (the
    # apex resolves to the WAN IP; the router port-forwards 80/443 to the
    # ingress LB at 192.168.0.6). external-dns only manages CNAME+TXT
    # records, so it needs the target spelled out.
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    # lagrange-admin speaks plain HTTP on :8443 (the port number is high
    # but the protocol is not TLS). nginx terminates the public TLS; the
    # upstream hop is HTTP all the way through socat to 10.99.0.2:8443.
spec:
  ingressClassName: nginx
  tls:
    - hosts: [lagrange.chrismiller.xyz]
      secretName: lagrange-admin-tls
  rules:
    - host: lagrange.chrismiller.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lagrange-admin
                port:
                  number: 8443
