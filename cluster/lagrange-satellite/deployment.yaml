---
# Cluster-side WireGuard gateway. Lagrange (192.168.0.244) dials in over
# UDP/51820 (exposed via the wg-gateway LoadBalancer at .232) and becomes
# reachable inside the cluster at 10.99.0.2 — which is then fronted by the
# lagrange-admin Service in service.yaml.
#
# The init container assembles wg0.conf from two sources kept deliberately
# separate: the public peer info (ConfigMap, plain YAML) and the cluster
# private key (Secret, SealedSecret-backed). They meet only in the pod's
# in-memory emptyDir at /run/wg, never on disk in the repo.
#
# Talos has WireGuard built into the kernel (=y, not =m), so we deliberately
# do NOT request SYS_MODULE — that capability is rejected on Talos. NET_ADMIN
# alone is enough to bring up wg0.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-gateway
  namespace: ops
  labels:
    app: wg-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-gateway
  template:
    metadata:
      labels:
        app: wg-gateway
    spec:
      initContainers:
        - name: assemble-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -eu
              umask 077
              {
                echo "[Interface]"
                echo "Address    = 10.99.0.1/32"
                echo "ListenPort = 51820"
                echo "PrivateKey = $(cat /secret/privatekey)"
                echo
                cat /peers/peers.conf
              } > /out/wg0.conf
          volumeMounts:
            - {name: secret, mountPath: /secret, readOnly: true}
            - {name: peers, mountPath: /peers, readOnly: true}
            - {name: assembled, mountPath: /out}
      containers:
        - name: wg
          image: ghcr.io/linuxserver/wireguard:latest
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - {name: PEERS, value: '0'}
            - {name: SERVERURL, value: auto}
            - {name: SERVERPORT, value: '51820'}
            - {name: LOG_CONFS, value: 'false'}
          volumeMounts:
            - name: assembled
              mountPath: /config/wg_confs
          ports:
            - containerPort: 51820
              protocol: UDP
          readinessProbe:
            exec:
              command: [sh, -c, wg show wg0 peers | grep -q .]
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: secret
          secret:
            secretName: wg-gateway
        - name: peers
          configMap:
            name: wg-gateway
        - name: assembled
          emptyDir:
            medium: Memory
