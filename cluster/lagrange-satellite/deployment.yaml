---
# Cluster-side WireGuard gateway. Lagrange (192.168.0.244) dials in over
# UDP/51820 (exposed via the wg-gateway LoadBalancer at .232) and becomes
# reachable inside the cluster at 10.99.0.2 — which is then fronted by the
# lagrange-admin Service in service.yaml.
#
# The init container assembles wg0.conf from two sources kept deliberately
# separate: the public peer info (ConfigMap, plain YAML) and the cluster
# private key (Secret, SealedSecret-backed). They meet only in the pod's
# in-memory emptyDir at /run/wg, never on disk in the repo.
#
# Talos has WireGuard built into the kernel (=y, not =m), so we deliberately
# do NOT request SYS_MODULE — that capability is rejected on Talos. NET_ADMIN
# alone is enough to bring up wg0.
#
# We override the linuxserver/wireguard image's entrypoint to skip its
# s6-overlay init — that init helpfully regenerates a fresh wg0.conf on
# every start (treating the pod as an "easy mode" server). We want our
# pre-assembled config used verbatim, so we just run wg-quick ourselves.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-gateway
  namespace: ops
  labels:
    app: wg-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-gateway
  template:
    metadata:
      labels:
        app: wg-gateway
    spec:
      initContainers:
        - name: assemble-config
          image: busybox:1.38@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              set -eu
              umask 077
              {
                echo "[Interface]"
                echo "Address    = 10.99.0.1/32"
                echo "ListenPort = 51820"
                echo "PrivateKey = $(cat /secret/privatekey)"
                echo
                cat /peers/peers.conf
              } > /out/wg0.conf
          volumeMounts:
            - {name: secret, mountPath: /secret, readOnly: true}
            - {name: peers, mountPath: /peers, readOnly: true}
            - {name: assembled, mountPath: /out}
      containers:
        - name: wg
          image: ghcr.io/linuxserver/wireguard:latest@sha256:1bf21d1c8933f7376da97bb14a459ae18e716e49d2e3456dbfd71414f60a319a
          command: [/bin/sh, -ec]
          args:
            - |
              wg-quick up /etc/wireguard/wg0.conf
              trap 'wg-quick down /etc/wireguard/wg0.conf; exit 0' TERM INT
              while kill -0 1 2>/dev/null; do sleep 30; done
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          volumeMounts:
            - name: assembled
              mountPath: /etc/wireguard
          ports:
            - containerPort: 51820
              protocol: UDP
          readinessProbe:
            exec:
              command: [sh, -c, wg show wg0 peers | grep -q .]
            initialDelaySeconds: 5
            periodSeconds: 10
        # Cluster pods can't route to 10.99.0.2 directly (only the
        # wg-gateway pod's namespace has the wg0 route), so this sidecar
        # exposes 8443 on the pod's eth0 and forwards through wg0. The
        # lagrange-admin Service selects on app=wg-gateway and lands here.
        - name: admin-proxy
          image: alpine/socat:1.8.1.1@sha256:2b6b49e9000105672bf70648f8642801791374a24f549d30bed3c3115c13d24c
          args:
            - -d
            - TCP-LISTEN:8443,reuseaddr,fork
            - TCP:10.99.0.2:8443
          ports:
            - containerPort: 8443
              protocol: TCP
              name: admin
      volumes:
        - name: secret
          secret:
            secretName: wg-gateway
        - name: peers
          configMap:
            name: wg-gateway
        - name: assembled
          emptyDir:
            medium: Memory
