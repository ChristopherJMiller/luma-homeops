---
# Public-facing WireGuard endpoint Lagrange dials into. Pinned to .232 in
# the lan-internal MetalLB pool (.230-.239); .230 is CephNFS, .231 is the
# registry, so .232 is the next free slot.
#
# externalTrafficPolicy: Local preserves the source IP so wg sees the
# real Lagrange address (.244) rather than a NAT'd cluster-internal one.
apiVersion: v1
kind: Service
metadata:
  name: wg-gateway
  namespace: ops
  annotations:
    metallb.universe.tf/address-pool: lan-internal
    metallb.universe.tf/loadBalancerIPs: 192.168.0.232
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: wg-gateway
  ports:
    - name: wg
      port: 51820
      targetPort: 51820
      protocol: UDP
---
# Headless Service that fronts the Lagrange admin API for in-cluster
# callers. The Endpoints object below pins it to 10.99.0.2 — Lagrange's
# WG IP — which is only routable from pods because the wg-gateway
# Deployment terminates the tunnel.
apiVersion: v1
kind: Service
metadata:
  name: lagrange-admin
  namespace: ops
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: lagrange-admin
  namespace: ops
subsets:
  - addresses:
      - ip: 10.99.0.2
    ports:
      - name: https
        port: 8443
        protocol: TCP
