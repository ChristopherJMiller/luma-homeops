---
# Public-facing WireGuard endpoint Lagrange dials into. Pinned to .232 in
# the lan-internal MetalLB pool (.230-.239); .230 is CephNFS, .231 is the
# registry, so .232 is the next free slot.
#
# externalTrafficPolicy: Local preserves the source IP so wg sees the
# real Lagrange address (.244) rather than a NAT'd cluster-internal one.
apiVersion: v1
kind: Service
metadata:
  name: wg-gateway
  namespace: ops
  annotations:
    metallb.universe.tf/address-pool: lan-internal
    metallb.universe.tf/loadBalancerIPs: 192.168.0.232
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: wg-gateway
  ports:
    - name: wg
      port: 51820
      targetPort: 51820
      protocol: UDP
---
# In-cluster front for the Lagrange admin API. Selects the wg-gateway pod,
# whose admin-proxy sidecar (socat) terminates the connection on :8443 and
# forwards it through wg0 to 10.99.0.2:8443 on Lagrange. We don't use a
# headless Service + manual Endpoints object because 10.99.0.2 isn't
# routable from cluster pods on its own — only from inside the gateway pod.
apiVersion: v1
kind: Service
metadata:
  name: lagrange-admin
  namespace: ops
  annotations:
    # Service.spec.clusterIP is immutable, so when we switched away from
    # the original `clusterIP: None` headless variant Argo couldn't apply
    # in place. Replace=true asks Argo to recreate this one resource.
    # Safe here because no client traffic depends on it yet.
    argocd.argoproj.io/sync-options: Force=true,Replace=true
spec:
  type: ClusterIP
  selector:
    app: wg-gateway
  ports:
    - name: https
      port: 8443
      targetPort: admin
      protocol: TCP
