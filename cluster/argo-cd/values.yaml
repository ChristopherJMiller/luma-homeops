---
argo-cd:
  global:
    domain: ci.chrismiller.xyz
    addPrometheusAnnotations: true
    statusbadge.enabled: true
  configs:
    repositories:
      luma-homeops:
        url: https://github.com/ChristopherJMiller/luma-homeops
    clusterCredentials:
      default:
        server: https://kubernetes.default.svc
        config: {}
    cm:
      timeout.reconciliation: 180s
      timeout.hard.reconciliation: 300s
  controller:
    replicas: 1
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argo-cd
        selector:
          release: prometheus
  dex:
    resources:
      limits:
        memory: 96Mi
      requests:
        cpu: 10m
        memory: 96Mi
  redis:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 150m
        memory: 128Mi
    exporter:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 64Mi
  server:
    pdb:
      enabled: true
      minAvailable: 1
    service:
      # Traefik reaches the backend over TLS (#2507); nginx keeps using its
      # backend-protocol annotation until cutover.
      annotations:
        traefik.ingress.kubernetes.io/service.serversscheme: https
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 256Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argo-cd
        selector:
          release: prometheus
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        external-dns.alpha.kubernetes.io/target: chrismiller.xyz
        nginx.ingress.kubernetes.io/backend-protocol: HTTPS
      # hostname removed — derived from global.domain
      # tls: true replaced with extraTls for chart 8.x+ schema
      extraTls:
        - hosts:
            - ci.chrismiller.xyz
          secretName: argocd-server-tls
  repoServer:
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      limits:
        memory: 1Gi
      requests:
        cpu: 10m
        memory: 1Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argo-cd
        selector:
          release: prometheus
  applicationSet:
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 200m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argo-cd
        selector:
          release: prometheus
  notifications:
    enabled: false
