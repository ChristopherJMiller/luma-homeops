---
# Admin ingress — Authentik-gated. Catches every path not claimed by
# share-public. Requires a ProxyProvider for share.chrismiller.xyz on
# the media outpost in Authentik before SSO will accept the host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: share-admin
  annotations:
    nginx.ingress.kubernetes.io/auth-url: |-
      http://ak-outpost-media-outpost.authentik.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx
    nginx.ingress.kubernetes.io/auth-signin: |-
      https://auth.chrismiller.xyz/outpost.goauthentik.io/start?rd=$scheme://$http_host$escaped_request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: |-
      Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid
    nginx.ingress.kubernetes.io/auth-snippet: |
      proxy_set_header X-Forwarded-Host $http_host;
    kubernetes.io/ingress.class: nginx
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    nginx.ingress.kubernetes.io/proxy-body-size: '0'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - share.chrismiller.xyz
      secretName: share-tls
  rules:
    - host: share.chrismiller.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: filebrowser
                port:
                  number: 80
