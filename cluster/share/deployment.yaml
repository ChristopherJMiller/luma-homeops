---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: filebrowser
  labels:
    app.kubernetes.io/name: filebrowser
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: filebrowser
  template:
    metadata:
      labels:
        app.kubernetes.io/name: filebrowser
    spec:
      nodeSelector:
        kubernetes.io/hostname: middle
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      initContainers:
        # noauth in v2.63 still needs at least one user in the DB to be
        # the "auto-logged-in" identity; without it /api/login returns
        # 500 "the resource does not exist". Initialize the DB, ensure
        # an admin user exists, and force auth.method=noauth.
        - name: seed-config
          image: filebrowser/filebrowser:v2.63.3
          command: [sh, -c]
          args:
            - |
              set -e
              DB=/database/filebrowser.db
              if [ ! -f "$DB" ]; then
                filebrowser -d "$DB" config init
              fi
              # Password is unused under noauth; "users add" errors if
              # admin already exists, which we ignore.
              filebrowser -d "$DB" users add admin "$(head -c 32 /dev/urandom | base64)" --perm.admin || true
              filebrowser -d "$DB" config set --auth.method=noauth
          volumeMounts:
            - name: database
              mountPath: /database
      containers:
        - name: filebrowser
          image: filebrowser/filebrowser:v2.63.3
          args:
            - --database=/database/filebrowser.db
            - --root=/srv
            - --address=0.0.0.0
            - --port=80
            - --log=stdout
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: media
              mountPath: /srv
            - name: database
              mountPath: /database
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: mm-media
        - name: database
          persistentVolumeClaim:
            claimName: filebrowser-data
