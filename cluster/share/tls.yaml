---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: share-tls
spec:
  secretName: share-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: share.chrismiller.xyz
  dnsNames:
    - share.chrismiller.xyz
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 384
