---
# Public, no-auth ingress for share links. Only the paths Filebrowser uses
# for unauthenticated share rendering are exposed here; everything else
# falls through to share-admin (Authentik-gated).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: share-public
  annotations:
    kubernetes.io/ingress.class: nginx
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    nginx.ingress.kubernetes.io/proxy-body-size: '0'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - share.chrismiller.xyz
      secretName: share-tls
  rules:
    - host: share.chrismiller.xyz
      http:
        paths:
          - path: /share
            pathType: Prefix
            backend:
              service:
                name: filebrowser
                port:
                  number: 80
          - path: /api/public
            pathType: Prefix
            backend:
              service:
                name: filebrowser
                port:
                  number: 80
          - path: /static
            pathType: Prefix
            backend:
              service:
                name: filebrowser
                port:
                  number: 80
