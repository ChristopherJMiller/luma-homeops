---
# Public, no-auth ingress — only /share/<token> is exposed without
# Authentik. /static/* and /api/public/* fall through to share-admin
# (Authentik-gated), which breaks the SPA-rendered share page for
# unauthenticated friends. Direct file download at
# /api/public/dl/<hash> also requires auth.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: share-public
  annotations:
    kubernetes.io/ingress.class: nginx
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_clear_headers "Content-Security-Policy";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - share.chrismiller.xyz
      secretName: share-tls
  rules:
    - host: share.chrismiller.xyz
      http:
        paths:
          - path: /share
            pathType: Prefix
            backend:
              service:
                name: filebrowser
                port:
                  number: 80
