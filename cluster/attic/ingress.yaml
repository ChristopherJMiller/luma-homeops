---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: attic-tls
  namespace: attic
spec:
  secretName: attic-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: attic.chrismiller.xyz
  dnsNames:
    - attic.chrismiller.xyz
  privateKey:
    algorithm: ECDSA
    size: 384
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: attic
  namespace: attic
  annotations:
    # NAR uploads can be large (multi-GB closures); raise the default 1m cap.
    nginx.ingress.kubernetes.io/proxy-body-size: 8g
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
spec:
  ingressClassName: nginx
  tls:
    - hosts: [attic.chrismiller.xyz]
      secretName: attic-tls
  rules:
    - host: attic.chrismiller.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: attic
                port:
                  number: 8080
