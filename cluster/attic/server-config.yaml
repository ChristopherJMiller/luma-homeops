---
# atticd server config — non-secret bits only. Sensitive fields (RS256 key,
# DB URL) come in via env from attic-server / attic-db Secrets at runtime.
# Schema: https://github.com/zhaofengli/attic/blob/main/server/src/config-template.toml
apiVersion: v1
kind: ConfigMap
metadata:
  name: attic-server-config
  namespace: attic
data:
  server.toml: |
    listen = "[::]:8080"

    allowed-hosts = ["attic.chrismiller.xyz"]
    api-endpoint = "https://attic.chrismiller.xyz/"

    require-proof-of-possession = true

    [database]
      # url is set via ATTIC_SERVER_DATABASE_URL env from attic-db secret.
      # Omitted from TOML because the template's literal "%database_url%"
      # placeholder fails TOML parse — atticd evaluates env overrides AFTER
      # parsing the file.
      heartbeat = false

    [storage]
      type = "local"
      path = "/var/lib/atticd/storage"

    [chunking]
      nar-size-threshold = 65536
      min-size = 16384
      avg-size = 65536
      max-size = 262144

    [compression]
      type = "zstd"

    [garbage-collection]
      interval = "12 hours"

    [jwt]
    # Signing key is set via ATTIC_SERVER_TOKEN_RS256_SECRET_BASE64 env
    # from attic-server secret (RSA-4096 PEM PKCS1, base64-encoded).
    # See note above re: omitting placeholder from TOML.
