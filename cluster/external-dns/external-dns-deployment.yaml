---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  template:
    spec:
      containers:
        - args:
            - --source=service
            - --source=ingress
            - --registry=txt
            - --provider=cloudflare
            - --policy=sync
            - --txt-owner-id=luma
            # Manage subdomains only; leave the apex A records to cloudflareddns.
            # NOTE: the leading-dot shortcut (`.chrismiller.xyz`) stopped working
            # in external-dns v0.19 (PR #5685 changed IDNA normalization, which
            # broke a silent fallback that had made the syntax usable). Use the
            # explicit `--exclude-domains` pattern instead.
            - --domain-filter=chrismiller.xyz,realliance.net,buttert.art,werethemille.rs
            - --exclude-domains=chrismiller.xyz,realliance.net,buttert.art,werethemille.rs
          name: external-dns
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: CF_API_EMAIL
              value: cmiller548@gmail.com
