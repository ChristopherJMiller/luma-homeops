---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  template:
    spec:
      containers:
        - args:
            - --source=service
            - --source=ingress
            - --registry=txt
            - --provider=cloudflare
            - --policy=sync
            - --txt-owner-id=luma
            # Scope to our four zones. One `--domain-filter` per zone —
            # external-dns treats the value as a single literal filter and
            # does NOT split on commas (see pkg/apis/externaldns/types.go:
            # "specify multiple times for multiple domains").
            #
            # The matcher is suffix-based, so each entry admits both the apex
            # (chrismiller.xyz) and every subdomain. Apex A records are owned
            # by cloudflareddns; the apex ingresses opt out individually with
            # `external-dns.alpha.kubernetes.io/controller: cloudflareddns`
            # so external-dns leaves them alone.
            #
            # (Don't use the `--domain-filter=.zone` shortcut — the leading
            # dot makes the matcher reject the zone apex during Cloudflare
            # zone discovery, so the provider never lists any records and
            # every new ingress silently no-op's. Regressed in v0.19 after
            # PR #5685 changed IDNA normalization.)
            - --domain-filter=chrismiller.xyz
            - --domain-filter=realliance.net
            - --domain-filter=buttert.art
            - --domain-filter=werethemille.rs
          name: external-dns
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: CF_API_EMAIL
              value: cmiller548@gmail.com
