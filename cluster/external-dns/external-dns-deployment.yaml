---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  template:
    spec:
      containers:
        - args:
            - --source=service
            - --source=ingress
            - --registry=txt
            - --provider=cloudflare
            - --policy=sync
            - --txt-owner-id=luma
            # Scope to our four zones. The matcher is suffix-based, so this
            # admits the apex (e.g. chrismiller.xyz) as well as every subdomain.
            # Apex A records are owned by cloudflareddns; the apex ingresses
            # opt out with `external-dns.alpha.kubernetes.io/controller:
            # cloudflareddns` so external-dns leaves them alone.
            #
            # (Don't use the `--domain-filter=.zone` shortcut — it stopped
            # admitting the zone apex in external-dns v0.19 after PR #5685
            # changed IDNA normalization, which silently no-op'd every new
            # ingress added after the bump.)
            - --domain-filter=chrismiller.xyz,realliance.net,buttert.art,werethemille.rs
            - --log-level=debug
          name: external-dns
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: CF_API_EMAIL
              value: cmiller548@gmail.com
