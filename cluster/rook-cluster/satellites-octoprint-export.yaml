---
# Declarative NFS export for the octoprint satellite, reconciled by the
# ceph-nfs-export-operator (cluster/ceph-nfs-export-operator/). To add a
# new satellite that needs network storage, drop a sibling file here.
apiVersion: nfs.luma-homelab.io/v1alpha1
kind: CephNFSExport
metadata:
  name: satellites-octoprint
  namespace: rook
spec:
  cluster: satellites
  fs: fs-pool
  path: /satellites/octoprint
  pseudo: /satellites/octoprint
  squash: no_root_squash
  accessType: NONE
  clients:
    - addresses: [192.168.0.243/32]
      accessType: RW
      squash: no_root_squash
