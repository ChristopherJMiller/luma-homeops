---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosquitto
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://storage.googleapis.com/t3n-helm-charts
    targetRevision: 2.x.x
    chart: mosquitto
    helm:
      releaseName: mosquitto
      valuesObject:
        service:
          type: LoadBalancer
          annotations:
            # Pin the IP mosquitto already holds by allocation — without
            # this a restart could grab .7, which Traefik needs (#2507).
            metallb.universe.tf/loadBalancerIPs: 192.168.0.8
        persistence:
          storageClass: rook-ceph-block
          size: 5Gi
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 128Mi
        monitoring:
          podMonitor:
            enabled: true
          sidecar:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - PrunePropagationPolicy=foreground
