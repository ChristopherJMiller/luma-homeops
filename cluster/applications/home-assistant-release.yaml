---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant-release
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/ChristopherJMiller/ha-helm.git
    path: ./
    targetRevision: v0.4.1
    helm:
      releaseName: ha
      valuesObject:
        image:
          tag: 2026.7.2
        hacs: true
        externalPostgres:
          host: acid-ha
          port: 5432
          username: postgres
          passwordFromSecretKeyRef:
            name: postgres.acid-ha.credentials.postgresql.acid.zalan.do
            key: password
        haConfigStorage:
          storageClassName: rook-ceph-block
          size: 5Gi
        # Canonical external URL so get_url() resolves behind the Cloudflare +
        # ingress proxy chain (fixes OAuth authorization-server metadata for MCP).
        externalUrl: https://home.chrismiller.xyz
        # Git-tracked config packages, mounted from the ha-packages ConfigMap
        # (built by cluster/home-assistant kustomize). Automations/helpers/etc.
        # live in cluster/home-assistant/packages/, edited in-repo not the UI.
        packages:
          enabled: true
        extraConfigMounts:
          - name: packages
            configMap: ha-packages
            mountPath: /config/packages
          - name: dashboards
            configMap: ha-dashboards
            mountPath: /config/dashboards
        # Git-tracked YAML-mode dashboard alongside the storage-mode default
        # (global mode stays storage so HACS custom-card resources keep working).
        lovelace:
          enabled: true
          dashboards:
            # url_path MUST contain a hyphen (HA rejects hyphenless custom paths).
            - urlPath: home-ops
              filename: dashboards/overview.yaml
              title: Home
              icon: mdi:home
              showInSidebar: true
        # Fail-fast: a bad automation/package blocks pod start instead of taking
        # HA down. Validated clean pre-cutover (circadian_lighting removed).
        checkConfig:
          enabled: true
        haconfig:
          sensor:
            - platform: derivative
              source: sensor.living_room_temperature
              name: Living Room Temperature Rate
              round: 2
              unit_time: h  # degrees per hour
              time_window: 00:30:00    # 30 minute window

          http:
            use_x_forwarded_for: true
            trusted_proxies:
              - 10.0.0.0/8
        ingress:
          enabled: true
          className: nginx
          annotations:
            kubernetes.io/ingress.class: nginx
            external-dns.alpha.kubernetes.io/target: chrismiller.xyz
            nginx.ingress.kubernetes.io/configuration-snippet: |
              more_clear_headers "Content-Security-Policy";
          hosts:
            - host: home.chrismiller.xyz
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - home.chrismiller.xyz
              secretName: home-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
