---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-cluster-operator
  namespace: argo-cd
spec:
  project: default
  source:
    # Vendored upstream manifests (was Bitnami's rabbitmq-cluster-operator
    # chart — moved off the deprecated, docker.io-rate-limited Bitnami OCI
    # catalog). Both operators pull from ghcr.io now. Cert-manager-issued
    # webhook certs (the upstream "-ghcr-io" variant still includes the
    # cert-manager Certificate/Issuer for the topology operator webhook).
    repoURL: https://github.com/ChristopherJMiller/luma-homeops.git
    path: cluster/rabbitmq-cluster-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: rabbitmq-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
