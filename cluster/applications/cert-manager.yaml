---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    targetRevision: 1.x.x
    chart: cert-manager
    helm:
      releaseName: cert-manager
      valuesObject:
        installCRDs: true
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            memory: 100Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: dns
  # cert-manager ships CRDs annotated `helm.sh/resource-policy: keep` and with
  # large OpenAPI schemas that Argo serializes differently from the live form,
  # producing perpetual OutOfSync. Workload itself is fine. Ignore drift on the
  # 4 cert-manager CRDs — they're upgraded explicitly by chart version bumps.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: certificaterequests.cert-manager.io
      jqPathExpressions:
        - .spec.versions[].schema
        - .metadata.annotations."helm.sh/resource-policy"
        - .metadata.labels
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: certificates.cert-manager.io
      jqPathExpressions:
        - .spec.versions[].schema
        - .metadata.annotations."helm.sh/resource-policy"
        - .metadata.labels
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: challenges.acme.cert-manager.io
      jqPathExpressions:
        - .spec.versions[].schema
        - .metadata.annotations."helm.sh/resource-policy"
        - .metadata.labels
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: orders.acme.cert-manager.io
      jqPathExpressions:
        - .spec.versions[].schema
        - .metadata.annotations."helm.sh/resource-policy"
        - .metadata.labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-issuer
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/ChristopherJMiller/luma-homeops.git
    path: cluster/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
