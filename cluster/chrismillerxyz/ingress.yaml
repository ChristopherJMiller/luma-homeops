---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chrismillerxyz
  namespace: chrismillerxyz
  labels:
    service: web
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    # cloudflareddns owns the apex A record (points at the WAN IP, not the
    # cluster LB). Without this opt-out, external-dns would push the LB IP
    # and fight cloudflareddns on every reconcile.
    external-dns.alpha.kubernetes.io/controller: cloudflareddns
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chrismiller.xyz
      secretName: chrismillerxyz-tls
  rules:
    - host: chrismiller.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mysite
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: www-chrismillerxyz
  namespace: chrismillerxyz
  labels:
    service: web
  annotations:
    kubernetes.io/ingress.class: nginx
    external-dns.alpha.kubernetes.io/target: chrismiller.xyz
    nginx.ingress.kubernetes.io/enable-cors: 'true'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.chrismiller.xyz
      secretName: chrismillerxyz-tls
  rules:
    - host: www.chrismiller.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mysite
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: chrismiller-tls
  namespace: chrismillerxyz
spec:
  secretName: chrismillerxyz-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: chrismiller.xyz
  dnsNames:
    - chrismiller.xyz
    - www.chrismiller.xyz
  privateKey:
    rotationPolicy: Always
    algorithm: ECDSA
    size: 384
