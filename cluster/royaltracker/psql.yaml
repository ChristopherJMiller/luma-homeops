---
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: acid-royaltracker
  labels:
    app: postgresql
    cluster: acid-royaltracker
spec:
  databases:
    royaltracker: royaltracker
  numberOfInstances: 2
  spiloRunAsUser: 101
  spiloRunAsGroup: 103
  spiloFSGroup: 103
  postgresql:
    version: '16'
    parameters:
      synchronous_commit: "off"
  patroni:
    failsafe_mode: true
  teamId: acid
  users:
    royaltracker:
      - superuser
      - createdb
  volume:
    size: 5Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
