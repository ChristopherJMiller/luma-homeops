---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
# edge-ca: dormant scaffold for per-satellite mTLS client certs. Not used
# by any v1 endpoint. Activate when an off-LAN satellite appears or a
# cluster write-path endpoint needs client-identity auth from edge.
#
# Phase 2 will add a real Issuer that uses this root, plus per-host
# Certificate resources and ingress-nginx auth-tls annotations.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: edge-ca-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: edge-ca-root
  namespace: cert-manager
spec:
  isCA: true
  commonName: galaxy edge CA
  secretName: edge-ca-root-tls
  duration: 87600h    # 10 years
  renewBefore: 720h   # 30 days
  privateKey:
    algorithm: ECDSA
    size: 384
  issuerRef:
    name: edge-ca-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: edge-ca
spec:
  ca:
    secretName: edge-ca-root-tls
