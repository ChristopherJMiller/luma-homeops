- title: Kitchen
  cards:
  - type: custom:mushroom-title-card
    title: Kitchen
  - type: custom:mushroom-light-card
    entity: light.kitchen_underlight
    show_brightness_control: true
    show_color_control: true
    use_light_color: true
  - type: horizontal-stack
    cards:
    - type: custom:mushroom-entity-card
      entity: binary_sensor.fridge_door_contact
      icon_color: blue
    - type: custom:mushroom-entity-card
      entity: binary_sensor.freezer_door_contact
      icon_color: cyan
  - type: custom:mushroom-entity-card
    entity: switch.kitchen_underlight_do_not_disturb
    icon: mdi:bell-off
- title: Calendar
  icon: mdi:calendar
  cards:
  - type: custom:mushroom-title-card
    title: Calendar
    subtitle: Events & Schedules
  - type: calendar
    entities:
    - calendar.cmiller548_gmail_com
    - calendar.chris_is_not_in_seattle_calendar
    - calendar.birthdays
    - calendar.holidays_in_united_states
    - calendar.home_maintenance
    - calendar.seattle_kraken_2022_23_schedule
    - calendar.family
  - type: custom:mushroom-title-card
    title: Current Events
  - type: custom:mushroom-entity-card
    entity: calendar.chris_is_not_in_seattle_calendar
    name: Travel Status
    icon: mdi:airplane
    icon_color: blue
- title: Energy
  icon: mdi:lightning-bolt
  cards:
  - type: custom:mushroom-title-card
    title: Energy Usage
    subtitle: Power Monitoring
  - type: vertical-stack
    cards:
    - type: custom:mushroom-entity-card
      entity: sensor.current_bill_electric_usage_to_date
      name: Current Usage
      icon: mdi:flash
      icon_color: amber
    - type: custom:mushroom-entity-card
      entity: sensor.current_bill_electric_cost_to_date
      name: Current Cost
      icon: mdi:currency-usd
      icon_color: green
    - type: custom:mushroom-entity-card
      entity: sensor.current_bill_electric_forecasted_usage
      name: Forecasted Usage
      icon: mdi:chart-line
      icon_color: blue
    - type: custom:mushroom-entity-card
      entity: sensor.current_bill_electric_forecasted_cost
      name: Forecasted Cost
      icon: mdi:cash-clock
      icon_color: orange
  - type: custom:mushroom-title-card
    title: Monthly Typical
  - type: horizontal-stack
    cards:
    - type: custom:mushroom-entity-card
      entity: sensor.typical_monthly_electric_usage
      name: Typical Usage
      icon: mdi:home-lightning-bolt
      icon_color: purple
    - type: custom:mushroom-entity-card
      entity: sensor.typical_monthly_electric_cost
      name: Typical Cost
      icon: mdi:cash
      icon_color: teal
