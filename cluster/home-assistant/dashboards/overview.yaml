views:
# =====================================================================
# HOME — warm-minimal glance. Deterministic 6-track grid via layout-card
# (named areas; collapses to one column ≤800px). The logic lives in
# packages/overview_brain.yaml — this view only displays those entities.
# =====================================================================
- title: Home
  type: custom:grid-layout
  layout:
    # Outer 1fr tracks are gutters — they center the 6 content tracks
    # (layout-card ignores max-width/margin:auto, so centering lives in
    # the grid definition itself).
    grid-template-columns: minmax(16px, 1fr) repeat(6, minmax(0, 185px)) minmax(16px, 1fr)
    grid-gap: 12px
    margin: 12px 0 28px
    grid-template-areas: |
      ". hero hero hero hero hero hero ."
      ". today today today agenda agenda agenda ."
      ". playing playing playing reminders reminders reminders ."
      ". rooms rooms rooms rooms rooms rooms ."
      ". room-lr room-lr room-br room-br room-kt room-kt ."
    mediaquery:
      "(max-width: 800px)":
        grid-template-columns: minmax(0, 1fr)
        grid-gap: 10px
        margin: 8px 10px 24px
        grid-template-areas: |
          "hero"
          "today"
          "agenda"
          "playing"
          "reminders"
          "rooms"
          "room-lr"
          "room-br"
          "room-kt"
  cards:
  # ---------- HERO: outfit verdict + weather + sun times (one tight band;
  #            horizon-card is too tall at grid width — times live in the
  #            secondary line instead) ----------
  - type: custom:mushroom-template-card
    view_layout:
      grid-area: hero
    primary: "{{ states('sensor.outfit_advice') }}"
    secondary: >-
      {{ states('sensor.current_city') }}  ·  {{ states('sensor.active_temperature') }}°
      {{ states('weather.forecast_home') | replace('-', ' ') | title }}
      ·  ↑ {{ as_timestamp(state_attr('sun.sun','next_rising')) | timestamp_custom('%-I:%M %p') }}
      ·  ↓ {{ as_timestamp(state_attr('sun.sun','next_setting')) | timestamp_custom('%-I:%M %p') }}
    icon: >-
      {% set c = states('weather.forecast_home') %}
      {% set m = {'sunny':'mdi:weather-sunny','clear-night':'mdi:weather-night',
      'cloudy':'mdi:weather-cloudy','partlycloudy':'mdi:weather-partly-cloudy',
      'rainy':'mdi:weather-rainy','pouring':'mdi:weather-pouring',
      'snowy':'mdi:weather-snowy','fog':'mdi:weather-fog','windy':'mdi:weather-windy'} %}
      {{ m.get(c, 'mdi:weather-partly-cloudy') }}
    icon_color: amber
    card_mod:
      style: |
        ha-card {
          background:
            radial-gradient(130% 200% at 10% -20%, rgba(221,161,94,0.22), transparent 60%),
            var(--card-background-color);
          border-radius: 24px;
          --mush-icon-size: 52px;
        }
        mushroom-shape-icon { --shape-color: transparent; }
        mushroom-state-info $ .primary { font-size: 22px; font-weight: 700; }
        mushroom-state-info $ .secondary { font-size: 14px; }
  # ---------- TODAY: transit (work days only) + mail ----------
  - type: vertical-stack
    view_layout:
      grid-area: today
    cards:
      - type: custom:mushroom-title-card
        title: Today
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.show_commute
            state: "on"
        card:
          type: custom:mushroom-template-card
          primary: "{{ states('sensor.commute_transit') }}"
          secondary: >-
            ~{% if is_state('sensor.current_city','Toronto') %}40{% else %}50{% endif %} min to the office
          icon: mdi:subway-variant
          icon_color: amber
          card_mod:
            style: |
              ha-card { border-radius: 20px; }
              mushroom-shape-icon { --shape-color: transparent; }
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          # front door — amber only when unlocked (state is the accent)
          - type: template
            entity: lock.front_door_lock
            content: "{{ 'Locked' if is_state('lock.front_door_lock','locked') else 'Unlocked' }}"
            icon: "{{ 'mdi:lock' if is_state('lock.front_door_lock','locked') else 'mdi:lock-open-variant' }}"
            icon_color: "{{ '' if is_state('lock.front_door_lock','locked') else 'amber' }}"
            tap_action:
              action: more-info
          # mail_and_packages was reconfigured — hello_chrismiller_xyz_* is
          # the live entity set (the old mail_* set is dead duplicates)
          - type: entity
            entity: sensor.hello_chrismiller_xyz_mail_usps_mail
            icon: mdi:mailbox
          - type: entity
            entity: sensor.hello_chrismiller_xyz_mail_amazon_packages
            icon: mdi:package
          - type: entity
            entity: sensor.hello_chrismiller_xyz_mail_amazon_packages_delivered
            icon: mdi:package-check
  # ---------- AGENDA ----------
  - type: vertical-stack
    view_layout:
      grid-area: agenda
    cards:
      - type: custom:mushroom-title-card
        title: Agenda
      - type: custom:calendar-card-pro
        entities:
          - entity: calendar.cmiller548_gmail_com
            color: '#DDA15E'
          - entity: calendar.family
            color: '#96A884'
          - entity: calendar.chris_is_not_in_seattle_calendar
            label: ✈️
            color: '#C2703D'
          - entity: calendar.birthdays
            label: 🎂
            color: '#C79BD6'
        days_to_show: 5
        compact_events_to_show: 4
        card_mod:
          style: "ha-card { border-radius: 22px; }"
  # ---------- NOW PLAYING (Plex creates per-client players dynamically;
  #            scan the domain instead of hardcoding entity_ids) ----------
  - type: vertical-stack
    view_layout:
      grid-area: playing
    cards:
      - type: custom:mushroom-title-card
        title: Now Playing
      - type: custom:mushroom-template-card
        primary: >-
          {% set p = (states.media_player | selectattr('state','eq','playing') | list
            + states.media_player | selectattr('state','eq','paused') | list)
            | first | default(none) %}
          {% if p %}{{ p.attributes.media_title | default(p.name) }}{% else %}Nothing playing{% endif %}
        secondary: >-
          {% set p = (states.media_player | selectattr('state','eq','playing') | list
            + states.media_player | selectattr('state','eq','paused') | list)
            | first | default(none) %}
          {% if p %}{% set sub = p.attributes.media_series_title | default(p.attributes.media_artist | default('')) %}{{ (sub ~ ' · ') if sub else '' }}{{ p.state | title }}{% else %}Plex is quiet{% endif %}
        icon: mdi:plex
        icon_color: >-
          {% if states.media_player | selectattr('state','eq','playing') | list | count > 0 %}amber{% endif %}
        picture: >-
          {% set p = (states.media_player | selectattr('state','eq','playing') | list
            + states.media_player | selectattr('state','eq','paused') | list)
            | first | default(none) %}
          {{ p.attributes.entity_picture | default('') if p else '' }}
        card_mod:
          style: |
            ha-card { border-radius: 22px; }
            mushroom-shape-icon { --shape-color: transparent; }
  # ---------- REMINDERS ----------
  - type: vertical-stack
    view_layout:
      grid-area: reminders
    cards:
      - type: custom:mushroom-title-card
        title: Reminders
      - type: todo-list
        entity: todo.shopping_list
        hide_completed: true
        hide_create: true
        card_mod:
          style: |
            ha-card {
              border-radius: 22px;
              max-height: 320px;
              overflow-y: auto;
            }
  # ---------- ROOMS (drill-down) ----------
  - type: custom:mushroom-title-card
    title: Rooms
    view_layout:
      grid-area: rooms
  - type: custom:mushroom-template-card
    view_layout:
      grid-area: room-lr
    primary: Living Room
    secondary: "{{ states('sensor.living_room_temperature') }}° · {{ states('sensor.living_room_humidity') }}%"
    icon: mdi:sofa
    icon_color: amber
    tap_action:
      action: navigate
      navigation_path: /home-ops/1
    card_mod: &roomtile
      style: |
        ha-card {
          background:
            radial-gradient(120% 130% at 20% 0%, rgba(221,161,94,0.13), transparent 62%),
            var(--card-background-color);
          border-radius: 22px;
          transition: transform .18s ease, box-shadow .18s ease;
        }
        ha-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px rgba(0,0,0,0.28);
        }
        mushroom-shape-icon { --shape-color: transparent; }
  - type: custom:mushroom-template-card
    view_layout:
      grid-area: room-br
    primary: Bedroom
    secondary: "{{ states('sensor.bedroom_temperature') }}° · {{ states('sensor.bedroom_humidity') }}%"
    icon: mdi:bed
    icon_color: amber
    tap_action:
      action: navigate
      navigation_path: /home-ops/2
    card_mod: *roomtile
  - type: custom:mushroom-template-card
    view_layout:
      grid-area: room-kt
    primary: Kitchen
    secondary: Tap to open
    icon: mdi:silverware-fork-knife
    icon_color: amber
    tap_action:
      action: navigate
      navigation_path: /home-ops/3
    card_mod: *roomtile
# =====================================================================
# ROOM PAGES — same grid grammar as Home: gutter-centered named areas,
# hero band + chips, lights column (4 tracks) + side column (2 tracks),
# single column ≤800px. Amber = state accent only.
# =====================================================================
- title: Living Room
  type: custom:grid-layout
  layout:
    grid-template-columns: minmax(16px, 1fr) repeat(6, minmax(0, 185px)) minmax(16px, 1fr)
    grid-gap: 12px
    margin: 12px 0 28px
    grid-template-areas: |
      ". hero hero hero hero hero hero ."
      ". lights lights lights lights side side ."
      ". ent ent ent ent ent ent ."
    mediaquery:
      "(max-width: 800px)":
        grid-template-columns: minmax(0, 1fr)
        grid-gap: 10px
        margin: 8px 10px 24px
        grid-template-areas: |
          "hero"
          "lights"
          "side"
          "ent"
  cards:
  - type: vertical-stack
    view_layout:
      grid-area: hero
    cards:
      - type: custom:mushroom-template-card
        primary: Living Room
        secondary: >-
          {{ states('sensor.living_room_temperature') }}° · {{ states('sensor.living_room_humidity') }}%
          · {{ expand('light.living_room', 'light.sidetable_lamp', 'light.desk_underlight')
               | selectattr('state','eq','on') | list | count }} lights on
        icon: mdi:sofa
        icon_color: amber
        card_mod: &roomhero
          style: |
            ha-card {
              background:
                radial-gradient(130% 200% at 10% -20%, rgba(221,161,94,0.16), transparent 60%),
                var(--card-background-color);
              border-radius: 24px;
              --mush-icon-size: 44px;
            }
            mushroom-shape-icon { --shape-color: transparent; }
            mushroom-state-info $ .primary { font-size: 20px; font-weight: 700; }
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: All on
            icon: mdi:lightbulb-group
            tap_action:
              action: call-service
              service: light.turn_on
              target:
                entity_id:
                  - light.living_room
                  - light.sidetable_lamp
                  - light.desk_underlight
          - type: template
            content: All off
            icon: mdi:lightbulb-group-off
            tap_action:
              action: call-service
              service: light.turn_off
              target:
                entity_id:
                  - light.living_room
                  - light.tv
                  - light.sidetable_lamp
                  - light.desk_underlight
          # whole-home adaptive lighting master (amber when adapting)
          - type: template
            entity: switch.circadian_adaptive_lighting_circadian
            content: Adaptive
            icon: mdi:sun-clock
            icon_color: "{{ 'amber' if is_state('switch.circadian_adaptive_lighting_circadian','on') else '' }}"
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.circadian_adaptive_lighting_circadian
  - type: vertical-stack
    view_layout:
      grid-area: lights
    cards:
      - type: custom:mushroom-title-card
        title: Lights
      - type: custom:mushroom-light-card
        entity: light.living_room
        name: All Hue
        show_brightness_control: true
        use_light_color: true
        card_mod: &lighttile
          style: |
            ha-card { border-radius: 18px; }
            mushroom-shape-icon { --shape-color: transparent; }
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.floor_lamp_a
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.floor_lamp_b
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.ground_spot
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.sidetable_lamp
            show_brightness_control: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.desk_underlight
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: Bright
            icon: mdi:brightness-7
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.living_room_bright
          - type: template
            content: Relax
            icon: mdi:sofa
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.living_room_relax
          - type: template
            content: Movie
            icon: mdi:movie
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.living_room_dimmed
          - type: template
            content: Read
            icon: mdi:book-open-variant
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.living_room_read
  - type: vertical-stack
    view_layout:
      grid-area: side
    cards:
      - type: custom:mushroom-title-card
        title: Climate
      - type: custom:mushroom-climate-card
        entity: climate.living_room
        show_temperature_control: true
        collapsible_controls: true
      - type: custom:mushroom-climate-card
        entity: climate.air_conditioner
        name: A/C
        icon: mdi:air-conditioner
        collapsible_controls: true
      - type: custom:mushroom-entity-card
        entity: switch.vent_fan_switch
        name: Vent Fan
        icon: mdi:fan
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: switch.floor_fan
        name: Floor Fan
        icon: mdi:fan
        tap_action:
          action: toggle
      - type: custom:mushroom-entity-card
        entity: switch.camp_lamp
        name: Camp Lamp
        icon: mdi:lamp
        tap_action:
          action: toggle
      - type: custom:mushroom-cover-card
        entity: cover.plant_blinds
        name: Plant Blinds
        show_tilt_position_control: true
  - type: vertical-stack
    view_layout:
      grid-area: ent
    cards:
      - type: custom:mushroom-title-card
        title: Entertainment
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.tv
            show_brightness_control: true
            use_light_color: true
            icon: mdi:television
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.tv_accent
            show_brightness_control: true
            use_light_color: true
            icon: mdi:television-ambient-light
            card_mod: *lighttile
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: TV Bright
            icon: mdi:brightness-7
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.tv_bright
          - type: template
            content: TV Movie
            icon: mdi:movie
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.tv_dimmed
          - type: template
            content: Ambient
            icon: mdi:lava-lamp
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.tv_cozy_dani
      - type: custom:mushroom-entity-card
        entity: sensor.plex_chrismiller_xyz
        name: Plex Server
        icon: mdi:plex
- title: Bedroom
  type: custom:grid-layout
  layout:
    grid-template-columns: minmax(16px, 1fr) repeat(6, minmax(0, 185px)) minmax(16px, 1fr)
    grid-gap: 12px
    margin: 12px 0 28px
    grid-template-areas: |
      ". hero hero hero hero hero hero ."
      ". lights lights lights lights side side ."
    mediaquery:
      "(max-width: 800px)":
        grid-template-columns: minmax(0, 1fr)
        grid-gap: 10px
        margin: 8px 10px 24px
        grid-template-areas: |
          "hero"
          "lights"
          "side"
  cards:
  - type: vertical-stack
    view_layout:
      grid-area: hero
    cards:
      - type: custom:mushroom-template-card
        primary: Bedroom
        secondary: >-
          {{ states('sensor.bedroom_temperature') }}° · {{ states('sensor.bedroom_humidity') }}%
          · {{ expand('light.bedroom') | selectattr('state','eq','on') | list | count }} lights on
        icon: mdi:bed
        icon_color: amber
        card_mod: *roomhero
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: All on
            icon: mdi:lightbulb-group
            tap_action:
              action: call-service
              service: light.turn_on
              target:
                entity_id: light.bedroom
          - type: template
            content: All off
            icon: mdi:lightbulb-group-off
            tap_action:
              action: call-service
              service: light.turn_off
              target:
                entity_id: light.bedroom
          - type: template
            entity: switch.circadian_adaptive_lighting_circadian
            content: Adaptive
            icon: mdi:sun-clock
            icon_color: "{{ 'amber' if is_state('switch.circadian_adaptive_lighting_circadian','on') else '' }}"
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.circadian_adaptive_lighting_circadian
          # adaptive-lighting sleep mode: 1% @ 1000K on the managed lamps
          - type: template
            entity: switch.adaptive_lighting_circadian_adaptive_lighting_sleep_mode_circadian
            content: Sleep
            icon: mdi:power-sleep
            icon_color: "{{ 'amber' if is_state('switch.adaptive_lighting_circadian_adaptive_lighting_sleep_mode_circadian','on') else '' }}"
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.adaptive_lighting_circadian_adaptive_lighting_sleep_mode_circadian
  - type: vertical-stack
    view_layout:
      grid-area: lights
    cards:
      - type: custom:mushroom-title-card
        title: Lights
      - type: custom:mushroom-light-card
        entity: light.bedroom
        name: All Lights
        show_brightness_control: true
        use_light_color: true
        card_mod: *lighttile
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-light-card
            entity: light.dresser_lamp
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.floor_lamp
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
          - type: custom:mushroom-light-card
            entity: light.nightstand_lamp
            show_brightness_control: true
            use_light_color: true
            card_mod: *lighttile
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            content: Bright
            icon: mdi:brightness-7
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.bedroom_bright
          - type: template
            content: Relax
            icon: mdi:bed
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.bedroom_relax
          - type: template
            content: Night
            icon: mdi:weather-night
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.bedroom_nightlight
          - type: template
            content: Sunset
            icon: mdi:weather-sunset
            tap_action:
              action: call-service
              service: scene.turn_on
              target:
                entity_id: scene.bedroom_sundown
  - type: vertical-stack
    view_layout:
      grid-area: side
    cards:
      - type: custom:mushroom-title-card
        title: Climate
      - type: custom:mushroom-climate-card
        entity: climate.bedroom
        show_temperature_control: true
        collapsible_controls: true
      - type: custom:mushroom-cover-card
        entity: cover.bedroom_blinds
        name: Blinds
        show_tilt_position_control: true
      # z2m entity_id is bedroom_bedroom_* — the short bedroom_light_switch
      # id referenced previously does not exist
      - type: custom:mushroom-entity-card
        entity: switch.bedroom_bedroom_light_switch
        name: Wall Switch
        icon: mdi:light-switch
        tap_action:
          action: toggle
- title: Kitchen
  type: custom:grid-layout
  layout:
    grid-template-columns: minmax(16px, 1fr) repeat(6, minmax(0, 185px)) minmax(16px, 1fr)
    grid-gap: 12px
    margin: 12px 0 28px
    grid-template-areas: |
      ". hero hero hero hero hero hero ."
      ". lights lights lights lights side side ."
    mediaquery:
      "(max-width: 800px)":
        grid-template-columns: minmax(0, 1fr)
        grid-gap: 10px
        margin: 8px 10px 24px
        grid-template-areas: |
          "hero"
          "lights"
          "side"
  cards:
  - type: vertical-stack
    view_layout:
      grid-area: hero
    cards:
      - type: custom:mushroom-template-card
        primary: Kitchen
        secondary: >-
          {% set f = states('binary_sensor.fridge_door_contact') %}
          {% set z = states('binary_sensor.freezer_door_contact') %}
          {{ 'Fridge open' if f == 'on' else 'Fridge closed' if f == 'off' else 'Fridge —' }}
          · {{ 'Freezer open' if z == 'on' else 'Freezer closed' if z == 'off' else 'Freezer —' }}
        icon: mdi:silverware-fork-knife
        icon_color: amber
        card_mod: *roomhero
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            entity: switch.kitchen_underlight_do_not_disturb
            content: Do not disturb
            icon: mdi:bell-off
            icon_color: "{{ 'amber' if is_state('switch.kitchen_underlight_do_not_disturb','on') else '' }}"
            tap_action:
              action: call-service
              service: switch.toggle
              target:
                entity_id: switch.kitchen_underlight_do_not_disturb
  - type: vertical-stack
    view_layout:
      grid-area: lights
    cards:
      - type: custom:mushroom-title-card
        title: Lights
      - type: custom:mushroom-light-card
        entity: light.kitchen_underlight
        show_brightness_control: true
        show_color_control: true
        use_light_color: true
        card_mod: *lighttile
  - type: vertical-stack
    view_layout:
      grid-area: side
    cards:
      - type: custom:mushroom-title-card
        title: Sensors
      - type: custom:mushroom-entity-card
        entity: binary_sensor.fridge_door_contact
        name: Fridge Door
      - type: custom:mushroom-entity-card
        entity: binary_sensor.freezer_door_contact
        name: Freezer Door
      - type: custom:mushroom-entity-card
        entity: binary_sensor.kitchen_sink_leak_sensor
