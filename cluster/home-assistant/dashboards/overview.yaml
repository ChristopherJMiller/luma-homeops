views:
- title: Home
  type: sections
  max_columns: 2
  sections:
    # ---------- HERO: outfit verdict + weather + sun ----------
    - type: grid
      column_span: 2
      cards:
        - type: custom:mushroom-template-card
          primary: "{{ states('sensor.outfit_advice') }}"
          secondary: >-
            {{ states('sensor.current_city') }} · {{ states('sensor.active_temperature') }}°
            {{ states('weather.forecast_home') | replace('-', ' ') | title }}   ·   ☀
            {{ as_timestamp(state_attr('sun.sun','next_rising')) | timestamp_custom('%-I:%M', true) }}
            ☾ {{ as_timestamp(state_attr('sun.sun','next_setting')) | timestamp_custom('%-I:%M', true) }}
          multiline_secondary: true
          icon: >-
            {% set c = states('weather.forecast_home') %}
            {% set m = {'sunny':'mdi:weather-sunny','clear-night':'mdi:weather-night',
            'cloudy':'mdi:weather-cloudy','partlycloudy':'mdi:weather-partly-cloudy',
            'rainy':'mdi:weather-rainy','pouring':'mdi:weather-pouring',
            'snowy':'mdi:weather-snowy','fog':'mdi:weather-fog','windy':'mdi:weather-windy'} %}
            {{ m.get(c, 'mdi:weather-partly-cloudy') }}
          icon_color: amber
          card_mod:
            style: |
              ha-card {
                background:
                  radial-gradient(135% 130% at 12% 0%, rgba(221,161,94,0.20), transparent 55%),
                  var(--card-background-color);
                border-radius: 26px;
                --card-primary-font-size: 23px;
                --card-primary-font-weight: 700;
              }
    # ---------- TODAY: transit + mail ----------
    - type: grid
      column_span: 1
      cards:
        - type: custom:mushroom-title-card
          title: Today
        - type: custom:mushroom-template-card
          primary: >-
            {% set m = states('sensor.active_commute') %}
            {% if m not in ['unknown','unavailable',''] %}{{ m }} min to the office{% else %}Commute{% endif %}
          secondary: "{{ states('sensor.commute_transit') }}"
          icon: mdi:train
          icon_color: amber
          card_mod:
            style: "ha-card { border-radius: 20px; }"
        - type: custom:mushroom-chips-card
          alignment: start
          chips:
            - type: entity
              entity: sensor.mail_usps_mail
              icon: mdi:mailbox
            - type: entity
              entity: sensor.mail_amazon_packages
              icon: mdi:package
            - type: entity
              entity: sensor.mail_amazon_packages_delivered
              icon: mdi:package-check
    # ---------- AGENDA ----------
    - type: grid
      column_span: 1
      cards:
        - type: custom:mushroom-title-card
          title: Agenda
        - type: custom:calendar-card-pro
          entities:
            - entity: calendar.cmiller548_gmail_com
              color: '#DDA15E'
            - entity: calendar.family
              color: '#96A884'
            - entity: calendar.chris_is_not_in_seattle_calendar
              label: ✈️
              color: '#C2703D'
            - entity: calendar.birthdays
              label: 🎂
              color: '#C79BD6'
          days_to_show: 5
          compact_events_to_show: 4
          card_mod:
            style: "ha-card { border-radius: 22px; }"
    # ---------- ROOMS (drill-down) ----------
    - type: grid
      column_span: 2
      cards:
        - type: custom:mushroom-title-card
          title: Rooms
        - type: grid
          columns: 3
          square: false
          cards:
            - type: custom:mushroom-template-card
              primary: Living Room
              secondary: "{{ states('sensor.living_room_temperature') }}° · {{ states('sensor.living_room_humidity') }}%"
              icon: mdi:sofa
              icon_color: amber
              tap_action:
                action: navigate
                navigation_path: /home-ops/1
              card_mod: &roomtile
                style: |
                  ha-card {
                    background:
                      radial-gradient(120% 120% at 20% 0%, rgba(221,161,94,0.13), transparent 60%),
                      var(--card-background-color);
                    border-radius: 22px;
                    transition: transform .18s ease, box-shadow .18s ease;
                  }
                  ha-card:hover {
                    transform: translateY(-2px);
                    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
                  }
            - type: custom:mushroom-template-card
              primary: Bedroom
              secondary: "{{ states('sensor.bedroom_temperature') }}° · {{ states('sensor.bedroom_humidity') }}%"
              icon: mdi:bed
              icon_color: amber
              tap_action:
                action: navigate
                navigation_path: /home-ops/2
              card_mod: *roomtile
            - type: custom:mushroom-template-card
              primary: Kitchen
              secondary: Tap to open
              icon: mdi:silverware-fork-knife
              icon_color: amber
              tap_action:
                action: navigate
                navigation_path: /home-ops/3
              card_mod: *roomtile
- title: Living Room
  cards:
  - type: custom:mushroom-title-card
    title: Living Room
    subtitle: '{{ states("sensor.living_room_temperature") }}°F | {{ states("sensor.living_room_humidity") }}%'
  - type: horizontal-stack
    cards:
    - type: custom:mushroom-climate-card
      entity: climate.living_room
      show_temperature_control: true
    - type: custom:mushroom-entity-card
      entity: switch.vent_fan_switch
      icon: mdi:fan
  - type: custom:mushroom-chips-card
    chips:
    - type: light
      entity: light.living_room
      content_info: name
    - type: light
      entity: light.floor_lamp_a
      content_info: name
    - type: light
      entity: light.floor_lamp_b
      content_info: name
    - type: light
      entity: light.sidetable_lamp
      content_info: name
    - type: light
      entity: light.desk_underlight
      content_info: name
    - type: light
      entity: light.ground_spot
      content_info: name
  - type: custom:mushroom-chips-card
    chips:
    - type: template
      content: Bright
      icon: mdi:brightness-7
      icon_color: yellow
      tap_action:
        action: call-service
        service: scene.turn_on
        data:
          entity_id: scene.living_room_bright
    - type: template
      content: Relax
      icon: mdi:sofa
      icon_color: orange
      tap_action:
        action: call-service
        service: scene.turn_on
        data:
          entity_id: scene.living_room_relax
    - type: template
      content: Movie
      icon: mdi:movie
      icon_color: purple
      tap_action:
        action: call-service
        service: scene.turn_on
        data:
          entity_id: scene.living_room_dimmed
  - type: vertical-stack
    cards:
    - type: custom:mushroom-title-card
      title: Entertainment
    - type: horizontal-stack
      cards:
      - type: custom:mushroom-light-card
        entity: light.tv
        show_brightness_control: true
        use_light_color: true
        icon: mdi:television
      - type: custom:mushroom-light-card
        entity: light.tv_accent
        show_brightness_control: true
        use_light_color: true
        icon: mdi:television-ambient-light
    - type: custom:mushroom-entity-card
      entity: sensor.plex_chrismiller_xyz
      name: Plex Server
      icon: mdi:plex
      icon_color: orange
    - type: custom:mushroom-chips-card
      chips:
      - type: template
        content: TV Bright
        icon: mdi:brightness-7
        icon_color: yellow
        tap_action:
          action: call-service
          service: scene.turn_on
          data:
            entity_id: scene.tv_bright
      - type: template
        content: TV Movie
        icon: mdi:movie
        icon_color: purple
        tap_action:
          action: call-service
          service: scene.turn_on
          data:
            entity_id: scene.tv_dimmed
      - type: template
        content: Ambient
        icon: mdi:lava-lamp
        icon_color: pink
        tap_action:
          action: call-service
          service: scene.turn_on
          data:
            entity_id: scene.tv_cozy_dani
