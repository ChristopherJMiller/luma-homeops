# Warm-minimal — calm, warm, one terracotta/amber accent, rounded borderless
# cards. Ships BOTH a dark and light mode; follows your Profile dark/light
# preference. Git-tracked, mounted at /config/themes. Select in Profile -> Themes.
Warm Minimal:
  # ---- shared (mode-independent) ----
  ha-card-border-radius: "22px"
  ha-card-border-width: "0px"
  mush-border-radius: "18"
  mush-icon-border-radius: "14"
  mush-card-primary-font-weight: "600"

  modes:
    # =========================== DARK (hero) ===========================
    dark:
      # accent — warm amber, reads well on espresso
      primary-color: "#DDA15E"
      accent-color: "#DDA15E"
      light-primary-color: "#E8BE8C"
      dark-primary-color: "#B87E43"

      # surfaces — warm espresso, not pure black; cards slightly lifted
      primary-background-color: "#1B1712"     # page
      secondary-background-color: "#231D17"   # wells / sidebar base
      card-background-color: "#28211A"        # cards
      ha-card-background: "#28211A"
      ha-card-box-shadow: "0 1px 0 rgba(255,255,255,0.03)"
      divider-color: "rgba(237,227,212,0.08)"

      # text — warm cream
      primary-text-color: "#EDE3D3"
      secondary-text-color: "#A99E8B"
      text-primary-color: "#221B14"           # text on the amber accent
      disabled-text-color: "#6F665A"

      # header + sidebar
      app-header-background-color: "#1B1712"
      app-header-text-color: "#EDE3D3"
      app-header-selection-bar-color: "#DDA15E"
      sidebar-background-color: "#1F1A14"
      sidebar-text-color: "#C4B9A6"
      sidebar-icon-color: "#8E8474"
      sidebar-selected-text-color: "#DDA15E"
      sidebar-selected-icon-color: "#DDA15E"

      # icons / states
      state-icon-color: "#B7AC98"
      paper-item-icon-color: "#B7AC98"
      state-icon-active-color: "#DDA15E"

      # controls
      switch-checked-color: "#DDA15E"
      switch-unchecked-color: "#5B5346"
      slider-color: "#DDA15E"
      slider-track-color: "#3A322A"
      input-fill-color: "#231D17"
      chip-background-color: "rgba(237,227,212,0.06)"

      # mushroom warm RGBs
      rgb-primary-color: "221,161,94"
      rgb-accent-color: "221,161,94"
      rgb-card-background-color: "40,33,26"
      rgb-state-light: "221,161,94"
      rgb-state-climate: "150,168,132"

    # =========================== LIGHT ===========================
    light:
      primary-color: "#C2703D"
      accent-color: "#C2703D"
      light-primary-color: "#E7CDB8"
      dark-primary-color: "#A85C2E"

      primary-background-color: "#EFE7D9"
      secondary-background-color: "#E7DDCB"
      card-background-color: "#FBF7EF"
      ha-card-background: "#FBF7EF"
      ha-card-box-shadow: "0 2px 14px rgba(58,52,44,0.07)"
      divider-color: "rgba(58,52,44,0.08)"

      primary-text-color: "#3A342C"
      secondary-text-color: "#8C8477"
      text-primary-color: "#FBF7EF"
      disabled-text-color: "#B7AE9F"

      app-header-background-color: "#EFE7D9"
      app-header-text-color: "#3A342C"
      app-header-selection-bar-color: "#C2703D"
      sidebar-background-color: "#EBE2D2"
      sidebar-text-color: "#5A5348"
      sidebar-icon-color: "#8C8477"
      sidebar-selected-text-color: "#C2703D"
      sidebar-selected-icon-color: "#C2703D"

      state-icon-color: "#7A7264"
      paper-item-icon-color: "#7A7264"
      state-icon-active-color: "#C2703D"

      switch-checked-color: "#C2703D"
      switch-unchecked-color: "#C4BAA8"
      slider-color: "#C2703D"
      slider-track-color: "#DED3C0"
      input-fill-color: "#F3ECE0"
      chip-background-color: "rgba(58,52,44,0.06)"

      rgb-primary-color: "194,112,61"
      rgb-accent-color: "194,112,61"
      rgb-card-background-color: "251,247,239"
      rgb-state-light: "216,154,91"
      rgb-state-climate: "138,154,123"
