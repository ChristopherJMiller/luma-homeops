---
# Remote (LAN 2.0) IPMI scraping of the node BMCs — no host access needed,
# so this runs as a plain restricted pod. Config (with credentials) comes
# from the ipmi-exporter-config SealedSecret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ipmi-exporter
  namespace: prometheus
  labels:
    app: ipmi-exporter
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ipmi-exporter
  template:
    metadata:
      labels:
        app: ipmi-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ipmi-exporter
          image: quay.io/prometheuscommunity/ipmi-exporter:v1.10.1@sha256:0662cadaf268b6718f0f66429047cb23566ab3e4c175f25eaf588416a7b035e8
          args:
            - --config.file=/config/config.yml
          env:
            # freeipmi writes its SDR cache under $HOME/.freeipmi; without a
            # writable HOME every collector fails with "read-only file system".
            - name: HOME
              value: /tmp
          ports:
            - name: http
              containerPort: 9290
              protocol: TCP
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config
          secret:
            secretName: ipmi-exporter-config
        - name: tmp
          emptyDir:
            medium: Memory
