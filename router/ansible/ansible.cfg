[defaults]
# Basic Configuration
inventory = inventory.yml
host_key_checking = False
timeout = 30
gathering = explicit
display_skipped_hosts = False

# Connection settings for network devices
network_group_modules = vyos

# Logging
log_path = ./ansible.log

# Output formatting (community.general.yaml callback was removed in v12;
# replaced by setting result_format on the built-in default callback).
stdout_callback = default
callback_result_format = yaml
bin_ansible_callbacks = True

# SSH settings
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
