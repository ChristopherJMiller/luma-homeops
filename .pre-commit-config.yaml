---
# Vendored upstream manifests and machine-generated configs are exempted
# from formatting/whitespace hooks so they stay byte-identical with the
# upstream source (vendored) or the generator output (talosctl).
#
# - cluster/rabbitmq-cluster-operator/{cluster-operator,messaging-topology-operator}.yaml
#   yamlfmt reflows CRD description strings and adds trailing whitespace,
#   which trailing-whitespace then strips, looping forever.
# - nodes/controlplane.yaml (and other nodes/*.yaml)
#   talosctl gen output uses `key:` with no trailing space for empty
#   values; yamlfmt adds a trailing space, trailing-whitespace strips it,
#   same loop. Don't reformat Talos config — it's regenerated/diffed
#   against `talosctl gen` upstream.
repos:
  - repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
    rev: 0.2.1
    hooks:
      - id: yamlfmt
        args: [--mapping, '2', --sequence, '4', --offset, '2']
        exclude: |
          (?x)^(
            cluster/rabbitmq-cluster-operator/(cluster-operator|messaging-topology-operator)\.yaml
            |nodes/.*\.yaml
            |cluster/home-assistant/(packages|blueprints|dashboards)/.*\.yaml
          )$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.0.1
    hooks:
      - id: check-added-large-files
        args: [--maxkb, '2048']
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            cluster/rabbitmq-cluster-operator/(cluster-operator|messaging-topology-operator)\.yaml
            |nodes/.*\.yaml
          )$
      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker
      - id: mixed-line-ending
        args: [--fix, lf]
      - id: trailing-whitespace
        exclude: |
          (?x)^(
            cluster/rabbitmq-cluster-operator/(cluster-operator|messaging-topology-operator)\.yaml
            |nodes/.*\.yaml
          )$
